name: Build and Push Docker image

on:
  push:
    branches:
      - '**'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    environment: production
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
    - name: Prepare platform pair
      env:
        platform: ${{ matrix.platform }}
      run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

    - name: Checkout code
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Generate Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ vars.DOCKER_REPOSITORY }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: ${{ matrix.platform }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ github.ref_name }}-${{ env.PLATFORM_PAIR }}
        cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ env.PLATFORM_PAIR }}
        outputs: type=image,name=${{ vars.DOCKER_REPOSITORY }},push-by-digest=true,name-canonical=true,push=true

    - name: Export digest
      run: |
        mkdir -p "${{ runner.temp }}/digests"
        digest="${{ steps.build.outputs.digest }}"
        touch "${{ runner.temp }}/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v6
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: ${{ runner.temp }}/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    name: Merge manifest
    environment: production
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
    - name: Download digests
      uses: actions/download-artifact@v7
      with:
        path: ${{ runner.temp }}/digests
        pattern: digests-*
        merge-multiple: true

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Generate Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ vars.DOCKER_REPOSITORY }}
        tags: |
          type=ref,event=branch

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Create manifest list and push
      working-directory: ${{ runner.temp }}/digests
      run: |
        docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          $(printf '${{ vars.DOCKER_REPOSITORY }}@sha256:%s ' *)

    - name: Inspect image
      run: docker buildx imagetools inspect ${{ vars.DOCKER_REPOSITORY }}:${{ steps.meta.outputs.version }}
